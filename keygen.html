<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuralTrader 独立激活码生成器</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0b0e11;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #161a1e;
      border: 1px solid #2b2f36;
      border-radius: 12px;
      padding: 30px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }
    h1 {
      font-size: 20px;
      color: #fff;
      text-align: center;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #9ca3af;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      background-color: #1e2329;
      border: 1px solid #474d57;
      border-radius: 6px;
      color: #fff;
      box-sizing: border-box;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #9333ea;
    }
    button {
      width: 100%;
      background-color: #9333ea;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #7e22ce;
    }
    .resultBox {
      margin-top: 20px;
      padding: 15px;
      background-color: #1e2329;
      border: 1px dashed #474d57;
      border-radius: 6px;
      text-align: center;
      user-select: all;
      word-break: break-all;
    }
    .code {
      font-family: monospace;
      font-size: 20px;
      color: #a855f7;
      letter-spacing: 1px;
      margin-bottom: 10px;
      display: inline-block;
    }
    .info {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      margin-top: 20px;
    }
    .copy-btn {
      background-color: #2b2f36;
      font-size: 12px;
      padding: 6px 12px;
      margin-bottom: 0;
      width: auto;
    }
    .copy-btn:hover {
      background-color: #474d57;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>激活码离线生成器</h1>
  
  <div>
    <label>加密密钥 (需与服务器设置的 LICENSE_SECRET 一致)</label>
    <input type="password" id="secret" value="NEURAL_TRADER_SUPER_SECRET_KEY_2026_OFFLINE_MODE">
  </div>
  
  <div>
    <label>授权天数</label>
    <select id="days">
      <option value="3">3 天 (体验)</option>
      <option value="7">7 天 (体验)</option>
      <option value="30">30 天 (月卡)</option>
      <option value="90">90 天 (季卡)</option>
      <option value="180">180 天 (半年卡)</option>
      <option value="365" selected>365 天 (年卡)</option>
      <option value="3650">3650 天 (十年/永久卡)</option>
    </select>
  </div>
  
  <button onclick="generate()">生成激活码</button>
  
  <div class="resultBox" id="resultBox" style="display: none;">
    <div class="code" id="codeOutput">XXXXX-XXXXX-XXXXX-XXXXX</div>
    <br>
    <button class="copy-btn" onclick="copyCode()">复制到剪贴板</button>
  </div>

  <div class="info">
    本工具完全在本地浏览器运行，不依赖网络连接。<br>您可以将其另存为本地文件 (Ctrl+S) 安全使用。
  </div>
</div>

<script>
  function formatHex(hexStr) {
    if (hexStr.length !== 20) return hexStr;
    return hexStr.match(/.{1,5}/g).join('-');
  }

  function generate() {
    const secret = document.getElementById('secret').value;
    const days = parseInt(document.getElementById('days').value, 10);
    
    if (!secret) {
      alert("请输入加密密钥！");
      return;
    }

    // 1. Convert days to 16-bit hex (4 characters)
    let daysHex = days.toString(16).toUpperCase();
    daysHex = daysHex.padStart(4, '0');

    // 2. Generate random 32-bit hex (8 characters)
    const randArr = new Uint8Array(4);
    window.crypto.getRandomValues(randArr);
    let randHex = Array.from(randArr).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();

    const payloadHex = daysHex + randHex; // 12 characters

    // 3. Compute HMAC-SHA256 of payload Hex using Secret
    const payloadWordArr = CryptoJS.enc.Hex.parse(payloadHex.toLowerCase());
    const hmac = CryptoJS.HmacSHA256(payloadWordArr, secret);
    
    // 4. Take first 8 characters (4 bytes) of HMAC as signature
    const sigHex = hmac.toString(CryptoJS.enc.Hex).substring(0, 8).toUpperCase();

    // 5. Combine and format
    const finalHex = payloadHex + sigHex; // 20 characters
    const finalCode = formatHex(finalHex);

    document.getElementById('codeOutput').innerText = finalCode;
    document.getElementById('resultBox').style.display = 'block';
  }

  function copyCode() {
    const code = document.getElementById('codeOutput').innerText;
    navigator.clipboard.writeText(code).then(() => {
      alert("复制成功！");
    }).catch(err => {
      alert("复制失败: " + err);
    });
  }
</script>

</body>
</html>
